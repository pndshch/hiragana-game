<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ひらがな あそび 🌸</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Hiragino Rounded Gothic Pro', 'ヒラギノ丸ゴ Pro W4',
                   'BIZ UDPGothic', 'Meiryo', sans-serif;
      background: linear-gradient(160deg, #cff4f0 0%, #ffd6e8 100%);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ============================================================
       SCREEN SYSTEM
    ============================================================ */
    .screen {
      display: none;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 36px;
    }
    .screen.active { display: flex; }

    /* ============================================================
       MENU SCREEN
    ============================================================ */
    #menuScreen {
      justify-content: center;
      gap: 24px;
      text-align: center;
    }

    .menu-mascot {
      font-size: 7rem;
      animation: bob 2.2s ease-in-out infinite;
      line-height: 1;
    }

    .menu-title {
      font-size: 2.8rem;
      color: #e84393;
      line-height: 1.3;
      text-shadow: 3px 3px 0 rgba(232,67,147,.15);
    }

    .menu-buttons {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-btn {
      width: 100%;
      border: none;
      border-radius: 28px;
      padding: 20px 16px;
      font-size: 1.5rem;
      font-family: inherit;
      cursor: pointer;
      line-height: 1.3;
      transition: transform .1s, box-shadow .1s;
    }
    .menu-btn:active { transform: translateY(5px) !important; }

    .btn-play {
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      color: #333;
      box-shadow: 0 7px 0 #7fbdba;
    }
    .btn-play:active { box-shadow: 0 2px 0 #7fbdba; }

    .btn-game {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      box-shadow: 0 7px 0 #b5154d;
    }
    .btn-game:active { box-shadow: 0 2px 0 #b5154d; }

    .menu-btn .btn-icon { font-size: 2rem; display: block; margin-bottom: 4px; }
    .menu-btn .btn-label { display: block; font-size: 1.25rem; }
    .menu-btn .btn-desc { display: block; font-size: .85rem; opacity: .7; margin-top: 3px; }

    /* ============================================================
       FREE PLAY SCREEN
    ============================================================ */
    #playScreen {
      gap: 0;
      position: relative;
    }

    .play-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .back-btn {
      background: rgba(255,255,255,.8);
      border: none;
      border-radius: 16px;
      padding: 10px 16px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      color: #555;
      box-shadow: 0 3px 8px rgba(0,0,0,.1);
    }

    .play-title {
      font-size: 1.3rem;
      color: #e84393;
      font-weight: bold;
    }

    /* 行選択ボタン */
    .row-selector {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .row-btn {
      background: rgba(255,255,255,.75);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 6px 12px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      color: #555;
      box-shadow: 0 3px 6px rgba(0,0,0,.1);
      transition: transform .1s, background .15s;
      white-space: nowrap;
    }
    .row-btn:active { transform: scale(.93); }
    .row-btn.selected {
      background: linear-gradient(135deg,#f093fb,#f5576c);
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 0 #b5154d;
    }

    .play-hint {
      font-size: 1.05rem;
      color: #777;
      text-align: center;
      margin-bottom: 16px;
      animation: hintFloat 2s ease-in-out infinite;
    }

    /* Floating bubble grid */
    .fp-grid {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }

    .fp-bubble {
      width: clamp(100px, 36vw, 145px);
      height: clamp(100px, 36vw, 145px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.8rem, 10vw, 4rem);
      cursor: pointer;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,.13), inset 0 -6px 10px rgba(0,0,0,.08);
      transition: transform .12s;
      animation: floatBob var(--fd, 2.2s) ease-in-out var(--fdel, 0s) infinite;
    }

    .fp-bubble:active { transform: scale(.93); }
    .fp-bubble.jumping { animation: jump .5s ease forwards; }

    /* Bubble color themes */
    .fp-bubble:nth-child(5n+1) { background: linear-gradient(145deg,#fff9c4,#ffcc02); box-shadow: 0 8px 0 #c49a00, 0 10px 20px rgba(0,0,0,.12); }
    .fp-bubble:nth-child(5n+2) { background: linear-gradient(145deg,#c8f9e0,#43e97b); box-shadow: 0 8px 0 #1a8c54, 0 10px 20px rgba(0,0,0,.12); }
    .fp-bubble:nth-child(5n+3) { background: linear-gradient(145deg,#fce4ec,#f953c6); box-shadow: 0 8px 0 #961248, 0 10px 20px rgba(0,0,0,.12); }
    .fp-bubble:nth-child(5n+4) { background: linear-gradient(145deg,#e3f2fd,#74b9ff); box-shadow: 0 8px 0 #1a6bbf, 0 10px 20px rgba(0,0,0,.12); }
    .fp-bubble:nth-child(5n+5) { background: linear-gradient(145deg,#ede7f6,#a29bfe); box-shadow: 0 8px 0 #5a52c0, 0 10px 20px rgba(0,0,0,.12); }

    /* ============================================================
       GAME SCREEN
    ============================================================ */
    #gameScreen {
      gap: 14px;
      max-width: 460px;
      margin: 0 auto;
      width: 100%;
    }

    /* Top bar */
    .game-topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .game-score {
      background: white;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 1.15rem;
      font-weight: bold;
      color: #e84393;
      box-shadow: 0 3px 8px rgba(0,0,0,.1);
    }

    .game-streak {
      background: white;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 1.15rem;
      font-weight: bold;
      color: #e17055;
      box-shadow: 0 3px 8px rgba(0,0,0,.1);
    }

    /* Mascot question area */
    .mascot-area {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,.85);
      border-radius: 24px;
      padding: 16px 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,.1);
    }

    .mascot-emoji {
      font-size: 3.5rem;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .mascot-emoji.speaking { animation: mascotSpeak .5s ease; }

    .mascot-right {
      flex: 1;
    }

    .mascot-question {
      font-size: 1rem;
      color: #888;
      margin-bottom: 4px;
    }

    .mascot-target-sound {
      font-size: 1.2rem;
      color: #333;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .replay-btn {
      background: linear-gradient(135deg,#74b9ff,#0984e3);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 9px 18px;
      font-size: .95rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 0 #1a5276;
      transition: transform .1s, box-shadow .1s;
    }
    .replay-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a5276; }

    /* Quiz bubbles */
    .quiz-bubbles {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .quiz-bubble {
      width: clamp(100px, 29vw, 136px);
      height: clamp(100px, 29vw, 136px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(3rem, 11vw, 4.2rem);
      cursor: pointer;
      position: relative;
      box-shadow: 0 8px 0 rgba(0,0,0,.15), 0 12px 24px rgba(0,0,0,.1);
      transition: transform .12s, box-shadow .12s;
      animation: floatBob var(--fd,2.2s) ease-in-out var(--fdel,0s) infinite;
    }
    .quiz-bubble:active { transform: scale(.93) translateY(4px); }

    /* Bubble colors (fixed per position) */
    #qb0 { background: linear-gradient(145deg,#fff9c4,#ffd200); --shadow: #b09000; }
    #qb1 { background: linear-gradient(145deg,#c8f9e0,#43e97b); --shadow: #1a8c54; }
    #qb2 { background: linear-gradient(145deg,#fce4ec,#f953c6); --shadow: #961248; }

    #qb0 { box-shadow: 0 8px 0 #b09000, 0 12px 24px rgba(0,0,0,.1); }
    #qb1 { box-shadow: 0 8px 0 #1a8c54, 0 12px 24px rgba(0,0,0,.1); }
    #qb2 { box-shadow: 0 8px 0 #961248, 0 12px 24px rgba(0,0,0,.1); }

    .quiz-bubble.correct-pop {
      animation: bigPop .5s ease forwards !important;
      background: linear-gradient(145deg,#55efc4,#00b894) !important;
      box-shadow: 0 8px 0 #006d4e, 0 12px 24px rgba(0,0,0,.1) !important;
    }

    .quiz-bubble.wrong-shake {
      animation: wrongShake .45s ease forwards !important;
      background: linear-gradient(145deg,#ffb3b3,#e55) !important;
      box-shadow: 0 8px 0 #922b21, 0 12px 24px rgba(0,0,0,.1) !important;
    }

    /* hint glow: shown on correct bubble after wrong answer */
    .quiz-bubble.hint-glow {
      animation: hintPulse 1s ease-in-out infinite !important;
    }

    /* Progress */
    .progress-area {
      width: 100%;
    }
    .progress-lbl {
      font-size: .82rem; color: #777; margin-bottom: 4px; text-align: center;
    }
    .progress-track {
      background: rgba(255,255,255,.5); border-radius: 10px; height: 13px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg,#f093fb,#f5576c);
      transition: width .5s ease; min-width: 4px;
    }

    /* ============================================================
       CELEBRATION OVERLAY
    ============================================================ */
    #celebOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    #celebOverlay.show { opacity: 1; pointer-events: all; }

    .celeb-card {
      background: white; border-radius: 32px;
      padding: 32px 28px; text-align: center;
      max-width: 320px; width: 90%;
      animation: celebPop .45s cubic-bezier(.175,.885,.32,1.275);
    }
    .celeb-ok     { font-size: 2.4rem; color: #e84393; margin-bottom: 10px; font-weight: bold; }
    .celeb-char   { font-size: 5rem; line-height: 1; margin-bottom: 4px; }
    .celeb-arrow  { font-size: 1.8rem; color: #ccc; margin: 2px 0; }
    .celeb-emoji  { font-size: 4rem; }
    .celeb-word   { font-size: 1.8rem; color: #333; font-weight: bold; margin: 4px 0 18px; }
    .celeb-next   { font-size: .88rem; color: #bbb; }

    /* ============================================================
       LEVEL UP
    ============================================================ */
    #levelUpBanner {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      background: linear-gradient(135deg,#ffd700,#ff9f43);
      color: white; border-radius: 24px; padding: 26px 32px;
      text-align: center; z-index: 200;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      transition: transform .4s cubic-bezier(.175,.885,.32,1.275);
      font-size: 1.25rem; line-height: 1.9;
      max-width: 300px; width: 90%;
      pointer-events: none;
    }
    #levelUpBanner.show { transform: translate(-50%,-50%) scale(1); }
    .lu-emoji  { font-size: 3rem; display: block; margin-bottom: 4px; }
    .lu-chars  { font-size: 2rem; letter-spacing: 5px; margin-top: 6px; }

    /* ============================================================
       CONFETTI
    ============================================================ */
    #confettiLayer {
      position: fixed; inset: 0; pointer-events: none; z-index: 300; overflow: hidden;
    }
    .conf { position: absolute; border-radius: 3px; animation: confFall linear forwards; }

    /* ============================================================
       KEYFRAMES
    ============================================================ */
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes floatBob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    @keyframes hintFloat {
      0%,100% { transform: translateY(0); opacity: .8; }
      50%      { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes jump {
      0%   { transform: scale(1) translateY(0); }
      30%  { transform: scale(1.35) translateY(-28px); }
      65%  { transform: scale(1.1) translateY(-10px); }
      85%  { transform: scale(1.04) translateY(-3px); }
      100% { transform: scale(1) translateY(0); }
    }
    @keyframes mascotSpeak {
      0%,100% { transform: scale(1); }
      25%     { transform: scale(1.25) rotate(-5deg); }
      75%     { transform: scale(1.15) rotate(5deg); }
    }
    @keyframes bigPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1.15); }
    }
    @keyframes wrongShake {
      0%,100%  { transform: translateX(0) scale(1); }
      20%      { transform: translateX(-12px) scale(.95) rotate(-4deg); }
      60%      { transform: translateX(12px) scale(.95) rotate(4deg); }
    }
    @keyframes hintPulse {
      0%,100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,220,0,.7); }
      50%     { transform: scale(1.08); box-shadow: 0 0 0 16px rgba(255,220,0,0); }
    }
    @keyframes celebPop {
      0%   { transform: scale(0) rotate(-8deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes confFall {
      0%   { top: -20px; opacity: 1; }
      100% { top: 110dvh; opacity: 0; transform: rotate(720deg) translateX(80px); }
    }
  </style>
</head>
<body>

<!-- ===== MENU SCREEN ===== -->
<div id="menuScreen" class="screen active">
  <div class="menu-mascot">🐼</div>
  <h1 class="menu-title">ひらがな<br>あそび！</h1>
  <div class="menu-buttons">
    <button class="menu-btn btn-play" onclick="showFreePlay()">
      <span class="btn-icon">🫧</span>
      <span class="btn-label">さわってあそぼう</span>
      <span class="btn-desc">ひらがなを タップすると おとが でるよ！</span>
    </button>
    <button class="menu-btn btn-game" onclick="showGame()">
      <span class="btn-icon">🎮</span>
      <span class="btn-label">ゲームをする</span>
      <span class="btn-desc">🐼が よんだ もじを みつけよう！</span>
    </button>
  </div>
</div>

<!-- ===== FREE PLAY SCREEN ===== -->
<div id="playScreen" class="screen">
  <div class="play-header">
    <button class="back-btn" onclick="showMenu()">← もどる</button>
    <div class="play-title">さわってあそぼう 🫧</div>
  </div>
  <!-- 行選択ボタン -->
  <div class="row-selector" id="rowSelector"></div>
  <p class="play-hint">ひらがなを タップしてみよう！ 🔊</p>
  <div class="fp-grid" id="fpGrid"></div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen" class="screen">

  <div class="game-topbar">
    <button class="back-btn" onclick="showMenu()">← もどる</button>
    <div class="game-score" id="gameScore">⭐ 0</div>
    <div class="game-streak" id="gameStreak">🔥 0</div>
  </div>

  <!-- Mascot question area -->
  <div class="mascot-area">
    <div class="mascot-emoji" id="mascotEmoji">🐼</div>
    <div class="mascot-right">
      <div class="mascot-question">このもじは なんと よむ？</div>
      <div class="mascot-target-sound" id="mascotSoundLabel">きいてね…</div>
      <button class="replay-btn" id="replayBtn" onclick="replaySound()">
        🔊 もういちど きく
      </button>
    </div>
  </div>

  <!-- Quiz bubbles -->
  <div class="quiz-bubbles">
    <div class="quiz-bubble" id="qb0" style="--fd:2.0s;--fdel:0.0s" onclick="tapQuizBubble(0)"></div>
    <div class="quiz-bubble" id="qb1" style="--fd:2.4s;--fdel:0.3s" onclick="tapQuizBubble(1)"></div>
    <div class="quiz-bubble" id="qb2" style="--fd:1.8s;--fdel:0.6s" onclick="tapQuizBubble(2)"></div>
  </div>

  <!-- Progress -->
  <div class="progress-area">
    <div class="progress-lbl" id="progressLbl">おぼえたもじ: 0 / 5</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

</div>

<!-- ===== CELEBRATION OVERLAY ===== -->
<div id="celebOverlay" onclick="onCelebTap()">
  <div class="celeb-card">
    <div class="celeb-ok">せいかい！🎉</div>
    <div class="celeb-char" id="celebChar">あ</div>
    <div class="celeb-arrow">↓</div>
    <div class="celeb-emoji" id="celebEmoji">🐜</div>
    <div class="celeb-word" id="celebWord">あり</div>
    <div class="celeb-next">タップして つぎへ →</div>
  </div>
</div>

<!-- ===== CONFETTI ===== -->
<div id="confettiLayer"></div>

<script>
// ================================================================
//  DATA
// ================================================================
const HIRAGANA = [
  {c:'あ',g:1,word:'あり',       we:'🐜'},
  {c:'い',g:1,word:'いぬ',       we:'🐶'},
  {c:'う',g:1,word:'うし',       we:'🐮'},
  {c:'え',g:1,word:'えほん',     we:'📚'},
  {c:'お',g:1,word:'おに',       we:'👹'},
  {c:'か',g:2,word:'かに',       we:'🦀'},
  {c:'き',g:2,word:'きりん',     we:'🦒'},
  {c:'く',g:2,word:'くま',       we:'🐻'},
  {c:'け',g:2,word:'けーき',     we:'🎂'},
  {c:'こ',g:2,word:'こあら',     we:'🐨'},
  {c:'さ',g:3,word:'さかな',     we:'🐟'},
  {c:'し',g:3,word:'しろくま',   we:'🐼'},
  {c:'す',g:3,word:'すいか',     we:'🍉'},
  {c:'せ',g:3,word:'せみ',       we:'🦗'},
  {c:'そ',g:3,word:'そら',       we:'☁️'},
  {c:'た',g:4,word:'たこ',       we:'🐙'},
  {c:'ち',g:4,word:'ちょうちょ', we:'🦋'},
  {c:'つ',g:4,word:'つき',       we:'🌙'},
  {c:'て',g:4,word:'てんとうむし',we:'🐞'},
  {c:'と',g:4,word:'とら',       we:'🐯'},
  {c:'な',g:5,word:'なす',       we:'🍆'},
  {c:'に',g:5,word:'にじ',       we:'🌈'},
  {c:'ぬ',g:5,word:'ぬいぐるみ', we:'🧸'},
  {c:'ね',g:5,word:'ねこ',       we:'🐱'},
  {c:'の',g:5,word:'のはら',     we:'🌾'},
  {c:'は',g:6,word:'はな',       we:'🌸'},
  {c:'ひ',g:6,word:'ひよこ',     we:'🐥'},
  {c:'ふ',g:6,word:'ふね',       we:'⛵'},
  {c:'へ',g:6,word:'へび',       we:'🐍'},
  {c:'ほ',g:6,word:'ほし',       we:'⭐'},
  {c:'ま',g:7,word:'まる',       we:'⭕'},
  {c:'み',g:7,word:'みかん',     we:'🍊'},
  {c:'む',g:7,word:'むし',       we:'🐛'},
  {c:'め',g:7,word:'めがね',     we:'👓'},
  {c:'も',g:7,word:'もも',       we:'🍑'},
  {c:'や',g:8,word:'やぎ',       we:'🐐'},
  {c:'ゆ',g:8,word:'ゆき',       we:'❄️'},
  {c:'よ',g:8,word:'よる',       we:'🌙'},
  {c:'ら',g:9,word:'らっぱ',     we:'🎺'},
  {c:'り',g:9,word:'りんご',     we:'🍎'},
  {c:'る',g:9,word:'るびー',     we:'💎'},
  {c:'れ',g:9,word:'れもん',     we:'🍋'},
  {c:'ろ',g:9,word:'ろうそく',   we:'🕯️'},
  {c:'わ',g:10,word:'わに',      we:'🐊'},
  {c:'を',g:10,word:'おを',      we:'📝'},
  {c:'ん',g:10,word:'ん',        we:'💫'},
];

// ================================================================
//  STATE
// ================================================================
let maxGroup    = 10;   // 全50音を最初から使用
let hitCount    = {};   // correct count per character
let queue       = [];
let current     = null; // current quiz question
let quizChars   = [];   // [char, char, char] assigned to 3 bubbles
let locked      = false;
let score       = 0;
let streak      = 0;
let totalCorrect= 0;
let audioCtx    = null;

HIRAGANA.forEach(h => { hitCount[h.c] = 0; });

// ================================================================
//  SCREEN NAVIGATION
// ================================================================
function showMenu() {
  setScreen('menuScreen');
}

function showFreePlay() {
  renderFreePlay();
  setScreen('playScreen');
}

function showGame() {
  setScreen('gameScreen');
  buildQueue();
  nextQuestion();
}

function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================================================================
//  FREE PLAY
// ================================================================
const ROW_LABELS = ['あ行','か行','さ行','た行','な行','は行','ま行','や行','ら行','わ行'];
let fpSelectedGroup = 1; // 表示中の行グループ

function showFreePlayGroup(g) {
  fpSelectedGroup = g;

  // ボタンの選択状態を更新
  document.querySelectorAll('.row-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.g) === g);
  });

  renderFpBubbles();
}

function renderFreePlay() {
  // 行選択ボタンを生成
  const selector = document.getElementById('rowSelector');
  selector.innerHTML = '';
  ROW_LABELS.forEach((label, i) => {
    const g = i + 1;
    const btn = document.createElement('button');
    btn.className = 'row-btn' + (g === fpSelectedGroup ? ' selected' : '');
    btn.dataset.g = g;
    btn.textContent = label;
    btn.addEventListener('click', () => showFreePlayGroup(g));
    selector.appendChild(btn);
  });

  renderFpBubbles();
}

function renderFpBubbles() {
  const grid = document.getElementById('fpGrid');
  grid.innerHTML = '';

  const chars = HIRAGANA.filter(h => h.g === fpSelectedGroup);
  const durations = [2.0, 2.5, 1.9, 2.3, 2.1, 2.6, 1.8, 2.4, 2.2, 2.7];
  const delays    = [0, .4, .8, .2, .6, 1.0, .3, .7, .1, .5];

  chars.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'fp-bubble';
    el.textContent = h.c;
    el.style.setProperty('--fd',   `${durations[i % durations.length]}s`);
    el.style.setProperty('--fdel', `${delays[i % delays.length]}s`);
    el.addEventListener('click', () => tapFreePlay(h.c, el));
    grid.appendChild(el);
  });
}

function tapFreePlay(char, el) {
  // Play sound — this is the whole point of free play
  speakChar(char);
  el.classList.remove('jumping');
  void el.offsetWidth;
  el.classList.add('jumping');
  el.addEventListener('animationend', () => el.classList.remove('jumping'), { once: true });
}

// ================================================================
//  GAME — QUESTION FLOW
// ================================================================
function buildQueue() {
  const pool = HIRAGANA.filter(h => h.g <= maxGroup);
  queue = shuffle([...pool]);
}

function nextQuestion() {
  document.getElementById('celebOverlay').classList.remove('show');
  locked = false;

  if (queue.length === 0) buildQueue();
  current = queue.pop();

  // Update label (character hidden from label — just show "きいてね…" until button pressed)
  document.getElementById('mascotSoundLabel').textContent = '🔊 ボタンを おしてね！';

  // Assign 3 bubble chars
  const pool = HIRAGANA.filter(h => h.c !== current.c && h.g <= maxGroup);
  const wrongs = shuffle(pool).slice(0, 2).map(h => h.c);
  quizChars = shuffle([current.c, ...wrongs]);

  // Reset bubble appearance
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById(`qb${i}`);
    el.className = 'quiz-bubble';
    el.style.setProperty('--fd',   `${[2.0,2.4,1.8][i]}s`);
    el.style.setProperty('--fdel', `${[0,.3,.6][i]}s`);
    el.textContent = quizChars[i];
  }

  updateStats();

  // Auto-play the target sound after a short pause
  setTimeout(playTargetSound, 600);
}

function playTargetSound() {
  const mascot = document.getElementById('mascotEmoji');
  mascot.classList.remove('speaking');
  void mascot.offsetWidth;
  mascot.classList.add('speaking');
  mascot.addEventListener('animationend', () => mascot.classList.remove('speaking'), { once: true });

  document.getElementById('mascotSoundLabel').textContent = `「${current.c}」を さがそう！`;

  speakChar(current.c);
}

function replaySound() {
  playTargetSound();
}

// ================================================================
//  GAME — TAP HANDLER
// ================================================================
function tapQuizBubble(idx) {
  if (locked) return;

  const tapped = quizChars[idx];
  const el     = document.getElementById(`qb${idx}`);
  const correct = current.c;

  if (tapped === correct) {
    // ✅ CORRECT
    locked = true;
    el.className = 'quiz-bubble correct-pop';
    playSound('correct');

    score += 10 + streak * 3;
    streak++;
    totalCorrect++;
    hitCount[correct]++;

    updateStats();

    setTimeout(showCelebration, 480);

  } else {
    // ❌ WRONG — do NOT play the wrong character's sound
    locked = true;
    el.className = 'quiz-bubble wrong-shake';
    playSound('wrong');
    streak = 0;
    updateStats();

    setTimeout(() => {
      // Reset wrong bubble
      el.className = 'quiz-bubble';

      // Glow the correct bubble as a hint
      const correctIdx = quizChars.indexOf(correct);
      document.getElementById(`qb${correctIdx}`).classList.add('hint-glow');

      // Replay the target sound so child knows what to find
      setTimeout(playTargetSound, 300);

      locked = false;
    }, 700);
  }
}

// ================================================================
//  CELEBRATION
// ================================================================
function showCelebration() {
  const d = current;
  document.getElementById('celebChar').textContent = d.c;
  document.getElementById('celebEmoji').textContent = d.we;
  document.getElementById('celebWord').textContent  = d.word;
  document.getElementById('celebOverlay').classList.add('show');

  // Play sound one more time so the association is reinforced
  setTimeout(() => speakChar(d.c), 250);

  launchConfetti();
}

function onCelebTap() {
  nextQuestion();
}


// ================================================================
//  STATS
// ================================================================
function updateStats() {
  document.getElementById('gameScore').textContent  = `⭐ ${score}`;
  document.getElementById('gameStreak').textContent = streak >= 3 ? `🔥 ${streak}` : `れんぞく ${streak}`;

  const available = HIRAGANA.filter(h => h.g <= maxGroup);
  const mastered  = available.filter(h => hitCount[h.c] >= 3);
  const pct = available.length ? (mastered.length / available.length) * 100 : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLbl').textContent  =
    `おぼえたもじ: ${mastered.length} / ${available.length}`;
}

// ================================================================
//  SPEECH (Web Speech API)
// ================================================================
function speakChar(char) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(char);
  u.lang  = 'ja-JP';
  u.rate  = 0.7;
  u.pitch = 1.3;
  window.speechSynthesis.speak(u);
}

// ================================================================
//  SOUND EFFECTS (Web Audio API)
// ================================================================
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ctx = getCtx();
    if (type === 'correct') {
      [[523,0],[659,.11],[784,.22]].forEach(([freq,delay]) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        g.gain.setValueAtTime(.22, t);
        g.gain.exponentialRampToValueAtTime(.001, t + .28);
        osc.start(t); osc.stop(t + .28);
      });
    } else {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(250, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(160, ctx.currentTime + .35);
      g.gain.setValueAtTime(.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .35);
      osc.start(); osc.stop(ctx.currentTime + .35);
    }
  } catch(_) {}
}

// ================================================================
//  CONFETTI
// ================================================================
function launchConfetti() {
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  const colors = ['#ff6b6b','#ffd700','#74b9ff','#55efc4','#a29bfe','#fd79a8','#ff9f43'];
  for (let i = 0; i < 48; i++) {
    const el = document.createElement('div');
    el.className = 'conf';
    const s = 8 + Math.random() * 11;
    el.style.cssText = [
      `left:${Math.random()*100}%`,
      `width:${s}px`, `height:${s}px`,
      `background:${colors[i%colors.length]}`,
      `animation-duration:${1.1+Math.random()*2}s`,
      `animation-delay:${Math.random()*.45}s`,
      `border-radius:${Math.random()>.5?'50%':'3px'}`,
    ].join(';');
    layer.appendChild(el);
  }
  setTimeout(() => { layer.innerHTML = ''; }, 3800);
}

// ================================================================
//  UTILITY
// ================================================================
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Keyboard shortcuts for testing
document.addEventListener('keydown', e => {
  if (e.key==='1') tapQuizBubble(0);
  if (e.key==='2') tapQuizBubble(1);
  if (e.key==='3') tapQuizBubble(2);
  if (e.key==='r') replaySound();
  if (e.key==='Enter') onCelebTap();
});
</script>
