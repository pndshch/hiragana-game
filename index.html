<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ひらがな ゲーム 🌸</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Hiragino Rounded Gothic Pro', 'ヒラギノ丸ゴ Pro W4',
                   'BIZ UDPGothic', 'Rounded Mplus 1c', sans-serif;
      background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 30px;
      overflow-x: hidden;
    }

    /* ========== START SCREEN ========== */
    #startScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 90dvh;
      width: 100%;
      max-width: 440px;
      text-align: center;
      gap: 20px;
    }

    .mascot-big {
      font-size: 7rem;
      animation: bob 2s ease-in-out infinite;
      line-height: 1;
    }

    .start-title {
      font-size: 3rem;
      color: #e84393;
      text-shadow: 3px 3px 0 rgba(232, 67, 147, 0.2);
      line-height: 1.2;
    }

    .start-desc {
      font-size: 1.25rem;
      color: #555;
      line-height: 1.9;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 18px 24px;
    }

    .start-btn {
      width: 100%;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 22px;
      font-size: 1.8rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 8px 0 #b5154d;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .start-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #b5154d;
    }

    /* ========== GAME SCREEN ========== */
    #gameScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 440px;
      gap: 14px;
    }

    #gameScreen.visible { display: flex; }

    /* Header */
    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game-title {
      font-size: 1.4rem;
      color: #e84393;
      font-weight: bold;
    }

    .score-badge {
      background: white;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #e84393;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    /* Stats row */
    .stats-row {
      width: 100%;
      display: flex;
      gap: 10px;
    }

    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.8);
      border-radius: 16px;
      padding: 10px 6px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .stat-val {
      font-size: 1.5rem;
      font-weight: bold;
      color: #333;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.72rem;
      color: #999;
      margin-top: 2px;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
    }

    .progress-lbl {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 5px;
      text-align: center;
    }

    .progress-track {
      background: rgba(255,255,255,0.5);
      border-radius: 10px;
      height: 14px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #f093fb, #f5576c);
      transition: width 0.5s ease;
      min-width: 4px;
    }

    /* Question card */
    .question-card {
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 24px 20px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .question-label {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .char-display {
      font-size: clamp(6rem, 22vw, 9rem);
      line-height: 1.1;
      color: #2c3e50;
      cursor: pointer;
      transition: transform 0.1s;
      display: inline-block;
    }

    .char-display:active { transform: scale(0.92); }

    .char-display.speaking {
      animation: speakPulse 0.6s ease;
    }

    .speak-btn {
      margin-top: 12px;
      background: #74b9ff;
      color: white;
      border: none;
      border-radius: 22px;
      padding: 10px 22px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 0 #2980b9;
      transition: transform 0.1s, box-shadow 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .speak-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2980b9;
    }

    /* Answer buttons */
    .answers-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .ans-btn {
      background: white;
      border: 4px solid transparent;
      border-radius: 22px;
      padding: 18px 8px;
      font-size: 1.8rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12);
      transition: transform 0.1s, box-shadow 0.1s;
      color: #333;
      line-height: 1;
    }

    .ans-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.12);
    }

    .ans-btn:nth-child(1) {
      background: linear-gradient(160deg, #fff9c4, #fff3e0);
      box-shadow: 0 6px 0 #d4a017;
    }
    .ans-btn:nth-child(2) {
      background: linear-gradient(160deg, #e8f5e9, #e3f2fd);
      box-shadow: 0 6px 0 #27ae60;
    }
    .ans-btn:nth-child(3) {
      background: linear-gradient(160deg, #fce4ec, #f3e5f5);
      box-shadow: 0 6px 0 #ad1457;
    }

    .ans-btn.correct {
      background: #55efc4 !important;
      border-color: #00b894;
      box-shadow: 0 6px 0 #00856b !important;
      animation: correctPop 0.4s ease;
    }

    .ans-btn.wrong {
      background: #ff7675 !important;
      border-color: #d63031;
      box-shadow: 0 6px 0 #922b21 !important;
      animation: wrongShake 0.45s ease;
    }

    /* ========== CELEBRATION OVERLAY ========== */
    #celebOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    #celebOverlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .celeb-card {
      background: white;
      border-radius: 30px;
      padding: 36px 40px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: celebPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .celeb-emoji { font-size: 5rem; margin-bottom: 10px; }

    .celeb-title {
      font-size: 2.8rem;
      color: #e84393;
      margin-bottom: 8px;
    }

    .celeb-reading {
      font-size: 1.6rem;
      color: #555;
      margin-bottom: 16px;
    }

    .celeb-hint { font-size: 0.9rem; color: #bbb; }

    /* ========== LEVEL UP OVERLAY ========== */
    #levelUpBanner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #ffd700, #ff9f43);
      color: white;
      border-radius: 24px;
      padding: 28px 36px;
      text-align: center;
      z-index: 200;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 1.3rem;
      line-height: 1.8;
      max-width: 320px;
      width: 90%;
    }

    #levelUpBanner.show { transform: translate(-50%, -50%) scale(1); }

    .levelup-emoji { font-size: 3.5rem; display: block; margin-bottom: 6px; }
    .levelup-chars { font-size: 2rem; letter-spacing: 4px; margin-top: 8px; }

    /* ========== CONFETTI ========== */
    #confettiLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
      overflow: hidden;
    }

    .conf-piece {
      position: absolute;
      border-radius: 3px;
      animation: confFall linear forwards;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes speakPulse {
      0%, 100% { transform: scale(1); }
      40% { transform: scale(1.12); }
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px) rotate(-3deg); }
      60% { transform: translateX(10px) rotate(3deg); }
    }

    @keyframes celebPop {
      0% { transform: scale(0) rotate(-8deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes confFall {
      0%   { top: -20px; opacity: 1; }
      100% { top: 110dvh; opacity: 0; transform: rotate(720deg) translateX(80px); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="startScreen">
  <div class="mascot-big">🐼</div>
  <h1 class="start-title">ひらがな<br>ゲーム！</h1>
  <p class="start-desc">
    おおきな もじを みて、<br>
    ただしい よみかたの<br>
    ボタンを おしてね！<br>
    🔊 もじは おとで きけるよ
  </p>
  <button class="start-btn" onclick="startGame()">▶ はじめる！</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen">

  <div class="header">
    <div class="game-title">🌸 ひらがな</div>
    <div class="score-badge" id="scoreBadge">⭐ 0</div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-lbl">れんぞく</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statCorrect">0</div>
      <div class="stat-lbl">せいかい</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statLevel">1</div>
      <div class="stat-lbl">グループ</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-lbl" id="progressLbl">おぼえたもじ: 0 / 5</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="question-card">
    <div class="question-label">なんと よむ？</div>
    <div class="char-display" id="charDisplay" onclick="speakChar()">あ</div>
    <br>
    <button class="speak-btn" onclick="speakChar()">🔊 もういちど きく</button>
  </div>

  <div class="answers-grid" id="answersGrid"></div>

</div>

<!-- ===== CELEBRATION OVERLAY ===== -->
<div id="celebOverlay" onclick="onCelebTap()">
  <div class="celeb-card">
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title">せいかい！</div>
    <div class="celeb-reading" id="celebReading">「あ」は「a」！</div>
    <div class="celeb-hint">タップして つぎへ →</div>
  </div>
</div>

<!-- ===== LEVEL UP BANNER ===== -->
<div id="levelUpBanner">
  <span class="levelup-emoji">🎊</span>
  あたらしい もじが<br>でてきたよ！
  <div class="levelup-chars" id="levelUpChars"></div>
</div>

<!-- ===== CONFETTI ===== -->
<div id="confettiLayer"></div>

<script>
// =============================================
// DATA
// =============================================
const HIRAGANA = [
  // group 1: あ行
  {c:'あ', r:'a',   g:1}, {c:'い', r:'i',   g:1}, {c:'う', r:'u',   g:1},
  {c:'え', r:'e',   g:1}, {c:'お', r:'o',   g:1},
  // group 2: か行
  {c:'か', r:'ka',  g:2}, {c:'き', r:'ki',  g:2}, {c:'く', r:'ku',  g:2},
  {c:'け', r:'ke',  g:2}, {c:'こ', r:'ko',  g:2},
  // group 3: さ行
  {c:'さ', r:'sa',  g:3}, {c:'し', r:'shi', g:3}, {c:'す', r:'su',  g:3},
  {c:'せ', r:'se',  g:3}, {c:'そ', r:'so',  g:3},
  // group 4: た行
  {c:'た', r:'ta',  g:4}, {c:'ち', r:'chi', g:4}, {c:'つ', r:'tsu', g:4},
  {c:'て', r:'te',  g:4}, {c:'と', r:'to',  g:4},
  // group 5: な行
  {c:'な', r:'na',  g:5}, {c:'に', r:'ni',  g:5}, {c:'ぬ', r:'nu',  g:5},
  {c:'ね', r:'ne',  g:5}, {c:'の', r:'no',  g:5},
  // group 6: は行
  {c:'は', r:'ha',  g:6}, {c:'ひ', r:'hi',  g:6}, {c:'ふ', r:'fu',  g:6},
  {c:'へ', r:'he',  g:6}, {c:'ほ', r:'ho',  g:6},
  // group 7: ま行
  {c:'ま', r:'ma',  g:7}, {c:'み', r:'mi',  g:7}, {c:'む', r:'mu',  g:7},
  {c:'め', r:'me',  g:7}, {c:'も', r:'mo',  g:7},
  // group 8: や行
  {c:'や', r:'ya',  g:8}, {c:'ゆ', r:'yu',  g:8}, {c:'よ', r:'yo',  g:8},
  // group 9: ら行
  {c:'ら', r:'ra',  g:9}, {c:'り', r:'ri',  g:9}, {c:'る', r:'ru',  g:9},
  {c:'れ', r:'re',  g:9}, {c:'ろ', r:'ro',  g:9},
  // group 10: わ行・ん
  {c:'わ', r:'wa',  g:10}, {c:'を', r:'wo', g:10}, {c:'ん', r:'n',  g:10},
];

const ALL_READINGS = [...new Set(HIRAGANA.map(h => h.r))];

const CELEB_EMOJIS = ['🎉','⭐','🌟','🎊','✨','🦄','🌈','💫','🍭','🎈','🏆','🎀'];

// =============================================
// STATE
// =============================================
let current = null;        // current hiragana object
let score = 0;
let streak = 0;
let totalCorrect = 0;
let maxGroup = 1;          // highest unlocked group
let hitCount = {};         // correct hits per character
let queue = [];
let locked = false;        // disable buttons during animation
let audioCtx = null;

HIRAGANA.forEach(h => { hitCount[h.c] = 0; });

// =============================================
// GAME FLOW
// =============================================
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('visible');
  buildQueue();
  nextQuestion();
}

function buildQueue() {
  const pool = HIRAGANA.filter(h => h.g <= maxGroup);
  queue = shuffle([...pool]);
}

function nextQuestion() {
  document.getElementById('celebOverlay').classList.remove('show');
  locked = false;

  if (queue.length === 0) buildQueue();
  current = queue.pop();

  document.getElementById('charDisplay').textContent = current.c;
  document.getElementById('charDisplay').classList.remove('speaking');
  buildAnswers();
  updateStats();

  // slight delay so layout settles before speech
  setTimeout(speakChar, 350);
}

function buildAnswers() {
  const correct = current.r;

  // pick 2 distractors from same-length readings when possible
  let pool = ALL_READINGS.filter(r => r !== correct);
  pool = shuffle(pool).slice(0, 2);

  const options = shuffle([correct, ...pool]);

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';

  options.forEach(reading => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = reading;
    btn.addEventListener('click', () => checkAnswer(reading, btn));
    grid.appendChild(btn);
  });
}

// =============================================
// ANSWER HANDLING
// =============================================
function checkAnswer(reading, btn) {
  if (locked) return;

  if (reading === current.r) {
    locked = true;
    btn.classList.add('correct');
    playSound('correct');

    score += 10 + streak * 3;
    streak++;
    totalCorrect++;
    hitCount[current.c] = (hitCount[current.c] || 0) + 1;

    updateStats();
    maybeUnlockGroup();

    setTimeout(showCelebration, 380);

  } else {
    btn.classList.add('wrong');
    playSound('wrong');
    streak = 0;
    updateStats();

    // highlight the correct button
    const allBtns = document.querySelectorAll('.ans-btn');
    allBtns.forEach(b => {
      if (b.textContent === current.r) {
        setTimeout(() => b.classList.add('correct'), 500);
      }
    });

    // re-enable after a moment
    setTimeout(() => {
      locked = false;
      allBtns.forEach(b => b.classList.remove('wrong', 'correct'));
    }, 1600);
  }
}

function showCelebration() {
  const emoji = CELEB_EMOJIS[Math.floor(Math.random() * CELEB_EMOJIS.length)];
  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebReading').textContent =
    `「${current.c}」は「${current.r}」！`;
  document.getElementById('celebOverlay').classList.add('show');
  launchConfetti();
}

function onCelebTap() {
  nextQuestion();
}

// =============================================
// LEVEL UP
// =============================================
function maybeUnlockGroup() {
  if (maxGroup >= 10) return;

  const groupChars = HIRAGANA.filter(h => h.g === maxGroup);
  const masteredCount = groupChars.filter(h => hitCount[h.c] >= 3).length;

  // unlock next group when 80% of current group is mastered
  if (masteredCount >= Math.ceil(groupChars.length * 0.8)) {
    maxGroup++;
    const newChars = HIRAGANA.filter(h => h.g === maxGroup).map(h => h.c).join('');
    document.getElementById('levelUpChars').textContent = newChars;
    buildQueue();
    showLevelUp();
  }
}

function showLevelUp() {
  const banner = document.getElementById('levelUpBanner');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3200);
}

// =============================================
// STATS UI
// =============================================
function updateStats() {
  document.getElementById('scoreBadge').textContent = `⭐ ${score}`;
  document.getElementById('statStreak').textContent  = streak >= 3 ? `🔥${streak}` : streak;
  document.getElementById('statCorrect').textContent = totalCorrect;
  document.getElementById('statLevel').textContent   = maxGroup;

  const available = HIRAGANA.filter(h => h.g <= maxGroup);
  const mastered  = available.filter(h => hitCount[h.c] >= 3);
  const pct = available.length ? (mastered.length / available.length) * 100 : 0;

  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLbl').textContent  =
    `おぼえたもじ: ${mastered.length} / ${available.length}`;
}

// =============================================
// SPEECH
// =============================================
function speakChar() {
  if (!current) return;

  const el = document.getElementById('charDisplay');
  el.classList.remove('speaking');
  // force reflow
  void el.offsetWidth;
  el.classList.add('speaking');

  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(current.c);
    utter.lang  = 'ja-JP';
    utter.rate  = 0.75;
    utter.pitch = 1.2;
    window.speechSynthesis.speak(utter);
  }
}

// =============================================
// SOUND EFFECTS
// =============================================
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    if (type === 'correct') {
      [[523, 0], [659, 0.12], [784, 0.24]].forEach(([freq, delay]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        osc.start(t); osc.stop(t + 0.28);
      });
    } else {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(150, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    }
  } catch(_) {}
}

// =============================================
// CONFETTI
// =============================================
function launchConfetti() {
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  const colors = ['#ff6b6b','#ffd700','#74b9ff','#55efc4','#a29bfe','#fd79a8','#ff9f43'];

  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'conf-piece';
    const size = 8 + Math.random() * 10;
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[i % colors.length]};
      animation-duration: ${1.2 + Math.random() * 1.8}s;
      animation-delay: ${Math.random() * 0.4}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
    `;
    layer.appendChild(el);
  }

  setTimeout(() => { layer.innerHTML = ''; }, 3500);
}

// =============================================
// UTILITY
// =============================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// keyboard support (1/2/3 to answer, space to hear again)
document.addEventListener('keydown', e => {
  const btns = document.querySelectorAll('.ans-btn');
  if (e.key === '1' && btns[0]) btns[0].click();
  if (e.key === '2' && btns[1]) btns[1].click();
  if (e.key === '3' && btns[2]) btns[2].click();
  if (e.key === ' ') speakChar();
  if (e.key === 'Enter') onCelebTap();
});
</script>
